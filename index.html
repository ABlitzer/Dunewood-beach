<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dunewood Beach · Fire Island</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0b1a2e;
    font-family: 'Courier New', Courier, monospace;
    color: #e0f2fe;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(125,211,252,0.15);
    flex-wrap: wrap;
    gap: 10px;
  }
  .loc-name {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #f0f9ff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .loc-dot {
    width: 8px; height: 8px;
    background: #38bdf8;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .loc-sub { font-size: 10px; letter-spacing: 3px; color: #7dd3fc; opacity: 0.7; margin-top: 3px; }
  .updated { font-size: 10px; color: #7dd3fc; opacity: 0.4; letter-spacing: 1px; text-align: right; }
  .refresh-btn {
    margin-top: 6px;
    background: none;
    border: 1px solid rgba(125,211,252,0.25);
    color: #38bdf8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    display: block;
  }
  .refresh-btn:hover { background: rgba(56,189,248,0.1); }
  .advisory {
    background: rgba(251,191,36,0.1);
    border-left: 3px solid #fbbf24;
    margin: 0 2px;
    padding: 10px 14px;
    font-size: 11px;
    color: #fcd34d;
    letter-spacing: 1px;
    display: none;
  }
  .sec-lbl { font-size: 10px; letter-spacing: 5px; color: #38bdf8; font-weight: 700; padding: 22px 20px 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 0 2px; }
  @media (max-width: 400px) { .grid { grid-template-columns: repeat(2,1fr); } }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(125,211,252,0.1);
    border-radius: 4px;
    padding: 16px 10px;
    text-align: center;
  }
  .card-tide {
    grid-column: 1 / -1;
    background: rgba(56,189,248,0.07);
    border: 1px solid rgba(56,189,248,0.25);
  }
  .card-icon { font-size: 22px; margin-bottom: 6px; }
  .card-lbl { font-size: 9px; letter-spacing: 2px; color: #7dd3fc; margin-bottom: 6px; font-weight: 700; }
  .card-main { font-size: 24px; font-weight: 900; color: #f0f9ff; line-height: 1; }
  .card-tide .card-main { font-size: 36px; letter-spacing: -1px; }
  .card-sub { font-size: 11px; color: #7dd3fc; margin-top: 4px; opacity: 0.75; }
  .source-tag { font-size: 8px; color: #38bdf8; opacity: 0.45; letter-spacing: 1px; margin-top: 4px; }
  .scroll { display: flex; overflow-x: auto; gap: 2px; padding: 0 2px 6px; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .hcard {
    flex: 0 0 76px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(125,211,252,0.1);
    border-radius: 4px;
    padding: 14px 8px;
    text-align: center;
  }
  .h-time { font-size: 10px; letter-spacing: 1px; color: #7dd3fc; margin-bottom: 8px; font-weight: 700; }
  .h-icon { font-size: 20px; margin-bottom: 6px; }
  .h-precip { font-size: 17px; font-weight: 900; line-height: 1; }
  .h-rlbl { font-size: 7px; letter-spacing: 2px; color: #7dd3fc; opacity: 0.6; margin-bottom: 6px; }
  .h-wind { font-size: 14px; font-weight: 700; color: #e0f2fe; }
  .h-unit { font-size: 8px; color: #7dd3fc; }
  .h-dir { font-size: 9px; color: #7dd3fc; opacity: 0.7; margin-top: 2px; letter-spacing: 1px; }
  .footer {
    font-size: 9px; color: #7dd3fc; opacity: 0.3;
    text-align: center; padding: 28px 20px 0;
    letter-spacing: 1px; line-height: 2;
  }
  .status { text-align: center; padding: 60px 20px; font-size: 13px; letter-spacing: 3px; color: #7dd3fc; }
  .error { color: #f87171; letter-spacing: 1px; line-height: 2; }
</style>
</head>
<body>
<div id="app"><div class="status">LOADING CONDITIONS…</div></div>

<script>
// Data sources:
// Waves + water temp: NOAA Buoy 44025 (20nm S of Fire Island Inlet) — actual measurements
// Wind, cloud, precip, visibility, UV: NWS api.weather.gov — 2.5km grid forecast, Fire Island zone
// Tides: NOAA CO-OPS Station 8531680 (Fire Island Inlet)

const BUOY_ID    = "44025";
const TIDE_STATION = "8531680";
// NWS grid for Fire Island zone (OKX office, grid 57,28)
const NWS_HOURLY = "https://api.weather.gov/gridpoints/OKX/57,28/forecast/hourly";
const NWS_ALERTS = "https://api.weather.gov/alerts/active?zone=ANZ353";

const UV_LABELS = ["Low","Low","Low","Moderate","Moderate","Moderate","High","High","Very High","Very High","Extreme"];
const UV_COLORS = ["#4ade80","#4ade80","#4ade80","#facc15","#facc15","#facc15","#f97316","#f97316","#ef4444","#ef4444","#9333ea"];

function mToFt(m){ return isNaN(m) ? "--" : (m * 3.281).toFixed(1); }
function knotsToMph(k){ return (isNaN(k)||k===null) ? "--" : Math.round(k * 1.15078); }
function degDir(d){ if(d===null||d===undefined||isNaN(d)) return "--"; return ["N","NE","E","SE","S","SW","W","NW"][Math.round(d/45)%8]; }
function cToF(c){ return isNaN(c) ? "--" : Math.round(c*9/5+32); }

function toAMPM(str){
  const d = new Date(str.replace(" ","T"));
  let h=d.getHours(), m=d.getMinutes(), ap=h>=12?"PM":"AM";
  h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`;
}
function hrLabel(isoStr){
  const d = new Date(isoStr);
  let h=d.getHours(), ap=h>=12?"PM":"AM";
  h=h%12||12; return `${h}${ap}`;
}
function nowStr(){
  const d=new Date(); let h=d.getHours(),m=d.getMinutes(),ap=h>=12?"PM":"AM";
  h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`;
}
function fmtDate(d){ return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; }
function cloudIcon(p){ return p<20?"☀️":p<50?"⛅":p<80?"🌥️":"☁️"; }
function precipColor(p){ return p<20?"#4ade80":p<50?"#facc15":p<70?"#f97316":"#ef4444"; }

// Parse NOAA buoy fixed-width text
function parseBuoy(text){
  const lines = text.trim().split("\n").filter(l => !l.startsWith("#") && l.trim());
  if (lines.length < 2) return null;
  const headers = lines[0].trim().split(/\s+/);
  // Skip unit row (second line starts with #yr or unit), grab first data row
  const dataLine = lines[1].trim().startsWith("#") ? lines[2] : lines[1];
  if (!dataLine) return null;
  const vals = dataLine.trim().split(/\s+/);
  const get = key => { const i=headers.indexOf(key); return (i>=0&&vals[i]!=="MM") ? parseFloat(vals[i]) : NaN; };
  return {
    windDir:  get("WDIR"),
    windSpd:  get("WSPD"),   // m/s
    windGust: get("GST"),    // m/s
    waveHt:   get("WVHT"),   // meters
    wavePer:  get("DPD"),    // seconds dominant period
    waveDir:  get("MWD"),    // degrees
    waterTemp:get("WTMP"),   // celsius
  };
}

// Extract value from NWS hourly period closest to now
function getNWSValue(periods, property, now){
  if (!periods || !periods.length) return null;
  const cur = periods.find(p => new Date(p.startTime) <= now && new Date(p.endTime) > now)
           || periods[0];
  const val = cur?.properties?.[property];
  if (val === undefined || val === null) return null;
  return val;
}

async function fetchAll(){
  const app = document.getElementById("app");
  try {
    const now = new Date();

    // 1. Buoy 44025 — waves + water temp (real measurements)
    const buoyRes = await fetch(`https://www.ndbc.noaa.gov/data/realtime2/${BUOY_ID}.txt`);
    const buoyText = await buoyRes.text();
    const buoy = parseBuoy(buoyText) || {};

    // 2. NWS hourly forecast — wind, cloud, precip, visibility (Fire Island zone)
    const nwsRes = await fetch(NWS_HOURLY, { headers: { "User-Agent": "dunewood-beach-dashboard" }});
    const nwsData = await nwsRes.json();
    const periods = nwsData?.properties?.periods || [];

    // Find current and next 9 hours
    const currentPeriod = periods.find(p => new Date(p.startTime) <= now && new Date(p.endTime) > now) || periods[0];
    const futurePeriods = periods.filter(p => new Date(p.startTime) >= now).slice(0, 9);

    // 3. NWS alerts for ANZ353
    let advisoryText = null;
    try {
      const alertRes = await fetch(NWS_ALERTS, { headers: { "User-Agent": "dunewood-beach-dashboard" }});
      const alertData = await alertRes.json();
      const active = alertData?.features?.[0];
      if (active) advisoryText = active.properties?.event || null;
    } catch(e){}

    // 4. NOAA Tides
    const end = new Date(now.getTime() + 24*3600*1000);
    let tideTime="--", tideFt="--";
    try {
      const tRes = await fetch(`https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=web_services&begin_date=${fmtDate(now)}&end_date=${fmtDate(end)}&datum=MLLW&station=${TIDE_STATION}&time_zone=lst_ldt&interval=hilo&units=english&format=json`);
      const tj = await tRes.json();
      if (tj.predictions){
        const nextHigh = tj.predictions.filter(p=>p.type==="H").filter(p=>new Date(p.t.replace(" ","T"))>now)[0];
        if (nextHigh){ tideTime=toAMPM(nextHigh.t); tideFt=parseFloat(nextHigh.v).toFixed(1); }
      }
    } catch(e){}

    // --- Parse current conditions ---
    // Wind from NWS (knots → mph)
    const windKts   = currentPeriod?.windSpeed ? parseInt(currentPeriod.windSpeed) : null;
    const windMph   = knotsToMph(windKts);
    const windDirStr = currentPeriod?.windDirection || "--";
    // NWS doesn't give gusts in hourly, check shortForecast for gust mention
    const gustMatch = currentPeriod?.shortForecast?.match(/gusts? (?:up to |as high as )?(\d+) mph/i);
    const gustMph   = gustMatch ? gustMatch[1] : null;

    // Cloud cover — NWS gives sky cover % in some products; use shortForecast text as fallback
    const cloudPct  = currentPeriod?.skyCover?.value ?? cloudFromText(currentPeriod?.shortForecast || "");
    // Precip
    const precipPct = currentPeriod?.probabilityOfPrecipitation?.value ?? 0;
    // Visibility (miles)
    const visMi     = currentPeriod?.visibility?.value != null
                      ? (currentPeriod.visibility.value * 0.000621371).toFixed(0)
                      : "--";
    // UV — NWS hourly doesn't carry UV; derive from time+cloud
    const uvEst     = estimateUV(now, cloudPct);

    // Waves from buoy
    const waveHtFt  = !isNaN(buoy.waveHt)   ? mToFt(buoy.waveHt)                    : "--";
    const wavePer   = !isNaN(buoy.wavePer)   ? `${Math.round(buoy.wavePer)}s`         : "--";
    const waveDirStr= !isNaN(buoy.waveDir)   ? degDir(buoy.waveDir)                   : "--";
    const waterTempF= !isNaN(buoy.waterTemp) ? `${cToF(buoy.waterTemp)}°F`            : "--";

    // Hourly strip
    const hourCards = futurePeriods.map(p => {
      const pCloud = p.skyCover?.value ?? cloudFromText(p.shortForecast || "");
      const pPrecip = p.probabilityOfPrecipitation?.value ?? 0;
      const pWindKts = parseInt(p.windSpeed) || 0;
      const pWindMph = knotsToMph(pWindKts);
      const pDir = p.windDirection || "--";
      return `
        <div class="hcard">
          <div class="h-time">${hrLabel(p.startTime)}</div>
          <div class="h-icon">${cloudIcon(pCloud)}</div>
          <div class="h-precip" style="color:${precipColor(pPrecip)}">${pPrecip}%</div>
          <div class="h-rlbl">RAIN</div>
          <div class="h-wind">${pWindMph}<span class="h-unit"> mph</span></div>
          <div class="h-dir">${pDir}</div>
        </div>`;
    }).join("");

    const uv    = Math.min(uvEst, 10);
    const advisoryHtml = advisoryText
      ? `<div class="advisory" style="display:block">⚠ NWS ADVISORY: ${advisoryText.toUpperCase()}</div>`
      : "";

    app.innerHTML = `
      <div class="header">
        <div>
          <div class="loc-name"><span class="loc-dot"></span>DUNEWOOD</div>
          <div class="loc-sub">FIRE ISLAND · NEW YORK</div>
        </div>
        <div class="updated">
          Updated ${nowStr()}
          <button class="refresh-btn" onclick="fetchAll()">↻ REFRESH</button>
        </div>
      </div>

      ${advisoryHtml}

      <div class="sec-lbl">NOW</div>
      <div class="grid">

        <div class="card card-tide">
          <div class="card-lbl">🌊 &nbsp;NEXT HIGH TIDE</div>
          <div class="card-main">${tideTime}</div>
          <div class="card-sub">${tideFt} ft &nbsp;·&nbsp; Fire Island Inlet</div>
        </div>

        <div class="card">
          <div class="card-icon">💨</div>
          <div class="card-lbl">WIND</div>
          <div class="card-main">${windMph} mph</div>
          <div class="card-sub">${windDirStr}${gustMph ? ` · gusts ${gustMph}` : ""}</div>
          <div class="source-tag">NWS FIRE ISLAND</div>
        </div>

        <div class="card">
          <div class="card-icon">🌊</div>
          <div class="card-lbl">WAVES</div>
          <div class="card-main">${waveHtFt} ft</div>
          <div class="card-sub">${wavePer} · ${waveDirStr}</div>
          <div class="source-tag">BUOY 44025</div>
        </div>

        <div class="card">
          <div class="card-icon">🌡️</div>
          <div class="card-lbl">WATER TEMP</div>
          <div class="card-main">${waterTempF}</div>
          <div class="card-sub">surface</div>
          <div class="source-tag">BUOY 44025</div>
        </div>

        <div class="card">
          <div class="card-icon">☁️</div>
          <div class="card-lbl">CLOUD COVER</div>
          <div class="card-main">${cloudPct}%</div>
          <div class="card-sub">${cloudLabel(cloudPct)}</div>
          <div class="source-tag">NWS FIRE ISLAND</div>
        </div>

        <div class="card">
          <div class="card-icon">🌧️</div>
          <div class="card-lbl">PRECIP</div>
          <div class="card-main">${precipPct}%</div>
          <div class="card-sub">chance</div>
          <div class="source-tag">NWS FIRE ISLAND</div>
        </div>

        <div class="card">
          <div class="card-icon">👁️</div>
          <div class="card-lbl">VISIBILITY</div>
          <div class="card-main">${visMi} mi</div>
          <div class="card-sub">&nbsp;</div>
          <div class="source-tag">NWS FIRE ISLAND</div>
        </div>

      </div>

      <div class="sec-lbl">REST OF DAY &nbsp;<span style="font-size:8px;opacity:0.5;letter-spacing:2px">NWS FORECAST</span></div>
      <div class="scroll">${hourCards}</div>

      <div class="footer">
        Waves &amp; Water Temp: NOAA Buoy 44025 (20nm S of Fire Island Inlet) — actual measurements<br>
        Wind · Cloud · Precip · Visibility: NWS api.weather.gov — 2.5km Fire Island zone forecast<br>
        Tides: NOAA CO-OPS Station ${TIDE_STATION} (Fire Island Inlet) · All sources public domain
      </div>`;

  } catch(e){
    app.innerHTML=`<div class="status error">
      Could not load conditions.<br>
      <small style="font-size:11px;opacity:0.6">${e.message}</small><br><br>
      <button onclick="fetchAll()" style="background:none;border:1px solid rgba(248,113,113,0.4);color:#f87171;font-family:inherit;font-size:11px;letter-spacing:2px;padding:8px 16px;border-radius:3px;cursor:pointer;">↻ TRY AGAIN</button>
    </div>`;
  }
}

// Derive cloud % from NWS short forecast text when skyCover not present
function cloudFromText(text){
  const t = text.toLowerCase();
  if (t.includes("clear") || t.includes("sunny")) return 5;
  if (t.includes("mostly sunny") || t.includes("mostly clear")) return 20;
  if (t.includes("partly sunny") || t.includes("partly cloudy")) return 45;
  if (t.includes("mostly cloudy")) return 75;
  if (t.includes("cloudy") || t.includes("overcast")) return 90;
  return 30;
}

function cloudLabel(pct){
  if (pct < 10) return "clear";
  if (pct < 30) return "mostly clear";
  if (pct < 60) return "partly cloudy";
  if (pct < 85) return "mostly cloudy";
  return "overcast";
}

// Simple UV estimate based on hour + cloud cover (no free local UV API)
function estimateUV(now, cloudPct){
  const h = now.getHours();
  if (h < 7 || h > 19) return 0;
  // Peak UV around 1pm in summer at this latitude
  const rawUV = Math.round(10 * Math.sin(Math.PI * (h - 7) / 13));
  const cloudFactor = 1 - (cloudPct / 100) * 0.75;
  return Math.max(0, Math.round(rawUV * cloudFactor));
}

fetchAll();
setInterval(fetchAll, 10 * 60 * 1000);
</script>
</body>
</html>
