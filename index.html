<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dunewood Beach · Fire Island</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b1a2e; font-family: 'Courier New', Courier, monospace; color: #e0f2fe; min-height: 100vh; padding-bottom: 40px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 24px 20px 16px; border-bottom: 1px solid rgba(125,211,252,0.15); flex-wrap: wrap; gap: 10px; }
  .loc-name { font-size: 20px; font-weight: 900; letter-spacing: 4px; color: #f0f9ff; display: flex; align-items: center; gap: 10px; }
  .loc-dot { width: 8px; height: 8px; background: #38bdf8; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .loc-sub { font-size: 10px; letter-spacing: 3px; color: #7dd3fc; opacity: 0.7; margin-top: 3px; }
  .updated { font-size: 10px; color: #7dd3fc; opacity: 0.4; letter-spacing: 1px; text-align: right; }
  .refresh-btn { margin-top: 6px; background: none; border: 1px solid rgba(125,211,252,0.25); color: #38bdf8; font-family: 'Courier New', Courier, monospace; font-size: 9px; letter-spacing: 2px; padding: 4px 10px; border-radius: 3px; cursor: pointer; display: block; }
  .refresh-btn:hover { background: rgba(56,189,248,0.1); }
  .sec-lbl { font-size: 10px; letter-spacing: 5px; color: #38bdf8; font-weight: 700; padding: 22px 20px 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 0 2px; }
  @media (max-width: 400px) { .grid { grid-template-columns: repeat(2,1fr); } }
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(125,211,252,0.1); border-radius: 4px; padding: 16px 10px; text-align: center; }
  .card-sun  { background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.2); }
  .card-tide { background: rgba(56,189,248,0.07); border: 1px solid rgba(56,189,248,0.25); }
  .card-icon { font-size: 22px; margin-bottom: 6px; }
  .card-lbl  { font-size: 11px; letter-spacing: 2px; color: #7dd3fc; margin-bottom: 6px; font-weight: 700; }
  .card-main { font-size: 24px; font-weight: 900; color: #f0f9ff; line-height: 1; }
  .card-sub  { font-size: 13px; color: #7dd3fc; margin-top: 4px; opacity: 0.75; }
  .source-tag{ font-size: 10px; color: #38bdf8; opacity: 0.45; letter-spacing: 1px; margin-top: 4px; }
  .scroll { display: flex; overflow-x: auto; gap: 2px; padding: 0 2px 6px; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .hcard { flex: 0 0 80px; background: rgba(255,255,255,0.04); border: 1px solid rgba(125,211,252,0.1); border-radius: 4px; padding: 12px 8px; text-align: center; }
  .h-time   { font-size: 10px; letter-spacing: 1px; color: #7dd3fc; margin-bottom: 6px; font-weight: 700; }
  .h-icon   { font-size: 18px; margin-bottom: 4px; }
  .h-temp   { font-size: 15px; font-weight: 900; color: #f0f9ff; margin-bottom: 4px; }
  .h-precip { font-size: 13px; font-weight: 700; line-height: 1; }
  .h-rlbl   { font-size: 7px; letter-spacing: 2px; color: #7dd3fc; opacity: 0.6; margin-bottom: 4px; }
  .h-wind   { font-size: 12px; font-weight: 700; color: #e0f2fe; }
  .h-unit   { font-size: 8px; color: #7dd3fc; }
  .h-dir    { font-size: 9px; color: #7dd3fc; opacity: 0.7; margin-top: 2px; letter-spacing: 1px; }
  .footer   { font-size: 9px; color: #7dd3fc; opacity: 0.3; text-align: center; padding: 28px 20px 0; letter-spacing: 1px; line-height: 2; }
  .status   { text-align: center; padding: 60px 20px; font-size: 13px; letter-spacing: 3px; color: #7dd3fc; }
  .error    { color: #f87171; letter-spacing: 1px; line-height: 2; }
</style>
</head>
<body>
<div id="app"><div class="status">LOADING CONDITIONS…</div></div>
<script>
// DATA SOURCES:
// Wind, temp, precip, cloud: NWS api.weather.gov — 2.5km forecast grid for Dunewood
// UV index: Open-Meteo — CORS-safe, coordinates locked to Dunewood
// Waves, water temp: NOAA Buoy 44025 via NERACOOS ERDDAP (CORS-safe JSON)
// Tides: NOAA CO-OPS station 8515014 (Fire Island Light, closest to Dunewood)
// Sunrise/Sunset: calculated from Dunewood coordinates

const BUOY_ID      = "44025";
const TIDE_STATION = "8515186"; // Fire Island Coast Guard Station — tide heights
const LAT          = 40.6512;
const LON          = -73.2154;

const UV_LABELS = ["Low","Low","Low","Moderate","Moderate","Moderate","High","High","Very High","Very High","Extreme"];
const UV_COLORS = ["#4ade80","#4ade80","#4ade80","#facc15","#facc15","#facc15","#f97316","#f97316","#ef4444","#ef4444","#9333ea"];

function mToFt(m)      { return isNaN(m) ? "--" : (m*3.281).toFixed(1); }
function knotsToMph(k) { return (isNaN(k)||k===null) ? "--" : Math.round(k*1.15078); }
function mpsToMph(v)   { return isNaN(v) ? "--" : Math.round(v*2.237); }
function degDir(d)     { if(!d&&d!==0) return "--"; return ["N","NE","E","SE","S","SW","W","NW"][Math.round(d/45)%8]; }
function cToF(c)       { return isNaN(c) ? "--" : Math.round(c*9/5+32)+"°F"; }
function fmtDate(d)    { return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; }
function cloudIcon(p)  { return p<20?"☀️":p<50?"⛅":p<80?"🌥️":"☁️"; }
function precipColor(p){ return p<20?"#4ade80":p<50?"#facc15":p<70?"#f97316":"#ef4444"; }
function cloudFromText(t) {
  t=(t||"").toLowerCase();
  if(t.includes("clear")||t.includes("sunny")) return 5;
  if(t.includes("mostly sunny")||t.includes("mostly clear")) return 20;
  if(t.includes("partly")) return 45;
  if(t.includes("mostly cloudy")) return 75;
  if(t.includes("cloudy")||t.includes("overcast")) return 90;
  return 40;
}
function nowStr() {
  const d=new Date(); let h=d.getHours(),m=d.getMinutes(),ap=h>=12?"PM":"AM";
  h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`;
}
function toAMPM(h,m) {
  const ap=h>=12?"PM":"AM"; h=h%12||12;
  return `${h}:${String(m).padStart(2,"0")} ${ap}`;
}
function hrLabel(str) {
  const d=new Date(str); let h=d.getHours(),ap=h>=12?"PM":"AM";
  h=h%12||12; return `${h}${ap}`;
}

// Sunrise/sunset for Dunewood coordinates
function getSunTimes(date) {
  const rad=Math.PI/180, J2000=2451545;
  const toJD=d=>(d.getTime()/86400000)+2440587.5;
  const jd=toJD(date), n=Math.ceil(jd-J2000-0.0009+LON/360);
  const Js=J2000+0.0009-LON/360+n;
  const M=(357.5291+0.98560028*(Js-J2000))%360;
  const C=1.9148*Math.sin(M*rad)+0.0200*Math.sin(2*M*rad)+0.0003*Math.sin(3*M*rad);
  const lam=(M+C+180+102.9372)%360;
  const Jt=Js+0.0053*Math.sin(M*rad)-0.0069*Math.sin(2*lam*rad);
  const dec=Math.asin(Math.sin(lam*rad)*Math.sin(23.4397*rad))/rad;
  const cosH=(Math.sin(-0.833*rad)-Math.sin(LAT*rad)*Math.sin(dec*rad))/(Math.cos(LAT*rad)*Math.cos(dec*rad));
  if(cosH<-1||cosH>1) return null;
  const H=Math.acos(cosH)/rad;
  const fromJD=jd=>new Date((jd-2440587.5)*86400000);
  return { rise:fromJD(Jt-H/360), set:fromJD(Jt+H/360) };
}
function nextSunEvent(now) {
  const today=getSunTimes(now), tomorrow=getSunTimes(new Date(now.getTime()+86400000));
  let rise=today?.rise, set=today?.set;
  if(rise&&rise<now) rise=tomorrow?.rise;
  if(set&&set<now)   set=tomorrow?.set;
  return {rise,set};
}

// Fetch with timeout so nothing hangs forever
function fetchT(url,opts={},ms=8000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  return fetch(url,{...opts,signal:c.signal}).finally(()=>clearTimeout(t));
}

// NWS — wind, temp, precip, cloud cover
async function fetchNWS(now) {
  const h={ "User-Agent":"DunewoodBeachDashboard/1.0 (github.com/ABlitzer/Dunewood-beach)" };
  const gr=await fetchT("https://api.weather.gov/points/40.6512,-73.2154",{headers:h});
  if(!gr.ok) throw new Error("NWS points failed");
  const gd=await gr.json();
  const hr=await fetchT(gd.properties.forecastHourly,{headers:h});
  if(!hr.ok) throw new Error("NWS hourly failed");
  const hd=await hr.json();
  const periods=hd.properties.periods;
  const cur=periods.find(p=>new Date(p.startTime)<=now&&new Date(p.endTime)>now)||periods[0];
  const future=periods.filter(p=>new Date(p.startTime)>=now).slice(0,9);
  const gustMatch=cur.shortForecast?.match(/gusts? (?:up to |as high as )?(\d+) mph/i);
  return {
    source:"NWS",
    windMph:  knotsToMph(parseInt(cur.windSpeed)||0),
    windDir:  cur.windDirection||"--",
    gustMph:  gustMatch?gustMatch[1]:null,
    cloudPct: cur.skyCover?.value??cloudFromText(cur.shortForecast),
    precipPct:cur.probabilityOfPrecipitation?.value??0,
    tempF:    cur.temperature??null,
    future,
  };
}

// Open-Meteo — UV index + fallback for all weather
async function fetchOpenMeteo(now) {
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=precipitation_probability,cloud_cover,wind_speed_10m,wind_direction_10m,temperature_2m,uv_index&hourly=precipitation_probability,wind_speed_10m,wind_direction_10m,cloud_cover,temperature_2m&timezone=America%2FNew_York&forecast_days=1`;
  const res=await fetchT(url);
  if(!res.ok) throw new Error("Open-Meteo failed");
  const data=await res.json();
  const cur=data.current, hourly=data.hourly, curHour=now.getHours();
  const future=[];
  for(let i=0;i<hourly.time.length;i++){
    if(new Date(hourly.time[i]).getHours()>=curHour&&future.length<9){
      future.push({
        startTime:hourly.time[i],
        windSpeed:mpsToMph(hourly.wind_speed_10m[i])+" mph",
        windDirection:degDir(hourly.wind_direction_10m[i]),
        probabilityOfPrecipitation:{value:hourly.precipitation_probability[i]},
        skyCover:{value:hourly.cloud_cover[i]},
        temperature:Math.round(hourly.temperature_2m[i]*9/5+32),
        shortForecast:"",_isMPS:true,
        _windMph:mpsToMph(hourly.wind_speed_10m[i]),
      });
    }
  }
  return {
    source:"Open-Meteo",
    windMph:mpsToMph(cur.wind_speed_10m),
    windDir:degDir(cur.wind_direction_10m),
    gustMph:null,
    cloudPct:cur.cloud_cover??0,
    precipPct:cur.precipitation_probability??0,
    tempF:cur.temperature_2m!=null?Math.round(cur.temperature_2m*9/5+32):null,
    uvIndex:cur.uv_index!=null?Math.round(cur.uv_index):null,
    future,
  };
}

// Buoy 44025 via NERACOOS ERDDAP — waves + water temp
async function fetchBuoy() {
  const now=new Date();
  const minus2h=new Date(now.getTime()-2*3600*1000).toISOString().replace(/\.\d+Z$/,"Z");
  const url=`https://data.neracoos.org/erddap/tabledap/NDBC_44025.json?time,WVHT,DPD,MWD,WTMP&time>=${minus2h}&orderByLimit("time,1")`;
  const res=await fetchT(url);
  if(!res.ok) throw new Error("ERDDAP failed");
  const data=await res.json();
  const cols=data.table.columnNames;
  const row=data.table.rows[data.table.rows.length-1];
  if(!row) throw new Error("No buoy data");
  const get=name=>{const i=cols.indexOf(name);return i>=0?row[i]:NaN;};
  return {waveHt:get("WVHT"),wavePer:get("DPD"),waveDir:get("MWD"),waterTemp:get("WTMP")};
}

// Tides — NOAA CO-OPS station 8515014 (Fire Island Light)
async function fetchTides(now) {
  const end=new Date(now.getTime()+48*3600*1000);
  const url=`https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=DunewoodBeach&begin_date=${fmtDate(now)}&end_date=${fmtDate(end)}&datum=MLLW&station=${TIDE_STATION}&time_zone=lst_ldt&interval=hilo&units=english&format=json`;
  const res=await fetchT(url);
  if(!res.ok) throw new Error("Tide fetch failed");
  const data=await res.json();
  if(data.error) throw new Error("Tide API: "+data.error.message);
  // Parse NOAA local time "YYYY-MM-DD HH:MM" as local
  const parseLocal=str=>{
    const [dt,tm]=str.split(" ");
    const [y,mo,d]=dt.split("-").map(Number);
    const [h,m]=tm.split(":").map(Number);
    return new Date(y,mo-1,d,h,m);
  };
  const nextHigh=data.predictions.filter(p=>p.type==="H").find(p=>parseLocal(p.t)>now);
  if(!nextHigh) throw new Error("No upcoming high tide found");
  const td=parseLocal(nextHigh.t);
  return { tideTime:toAMPM(td.getHours(),td.getMinutes()), tideFt:parseFloat(nextHigh.v).toFixed(1) };
}

async function fetchAll() {
  const app=document.getElementById("app");
  const now=new Date();
  try {
    // Fetch UV separately from Open-Meteo (always CORS-safe)
    // Fetch NWS with Open-Meteo as fallback for all other weather
    const [wxResult, uvResult, buoyResult, tideResult] = await Promise.allSettled([
      fetchNWS(now).catch(()=>fetchOpenMeteo(now)),
      fetchT(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=uv_index&timezone=America%2FNew_York`).then(r=>r.json()),
      fetchBuoy(),
      fetchTides(now),
    ]);

    const wx=wxResult.status==="fulfilled"?wxResult.value:null;
    if(!wx) throw new Error("All weather sources failed");

    // UV from Open-Meteo (reliable CORS)
    let uvIndex=null;
    if(uvResult.status==="fulfilled") uvIndex=Math.round(uvResult.value?.current?.uv_index??0);

    const buoy=buoyResult.status==="fulfilled"?buoyResult.value:{};
    const waveHtFt  =!isNaN(buoy.waveHt)   ?mToFt(buoy.waveHt)            :"--";
    const wavePer   =!isNaN(buoy.wavePer)   ?`${Math.round(buoy.wavePer)}s`:"--";
    const waveDirStr=!isNaN(buoy.waveDir)   ?degDir(buoy.waveDir)          :"--";
    const waterTempF=!isNaN(buoy.waterTemp) ?cToF(buoy.waterTemp)          :"--";

    const tideTime=tideResult.status==="fulfilled"?tideResult.value.tideTime:"--";
    const tideFt  =tideResult.status==="fulfilled"?tideResult.value.tideFt  :"--";
    if(tideResult.status==="rejected") console.warn("Tide error:",tideResult.reason?.message);

    const sun=nextSunEvent(now);
    const riseStr=sun.rise?toAMPM(sun.rise.getHours(),sun.rise.getMinutes()):"--";
    const setStr =sun.set ?toAMPM(sun.set.getHours(), sun.set.getMinutes()) :"--";

    const windMph  =wx.windMph, windDir=wx.windDir, gustMph=wx.gustMph;
    const precipPct=wx.precipPct, tempF=wx.tempF?`${wx.tempF}°F`:"--";
    const uv   =uvIndex!==null?Math.min(uvIndex,10):null;
    const uvVal=uv!==null?uv:"--";
    const uvCol=uv!==null?UV_COLORS[uv]:"#f0f9ff";
    const uvLbl=uv!==null?UV_LABELS[uv]:"";

    const sourceLabel=wx.source==="NWS"?"NWS FIRE ISLAND":"OPEN-METEO";

    const hourCards=wx.future.map(p=>{
      const pCloud =p.skyCover?.value??cloudFromText(p.shortForecast);
      const pPrecip=p.probabilityOfPrecipitation?.value??0;
      const pWind  =p._isMPS?p._windMph:knotsToMph(parseInt(p.windSpeed));
      const pDir   =p.windDirection||"--";
      const pTemp  =p.temperature!=null?`${p.temperature}°F`:"--";
      return `<div class="hcard">
        <div class="h-time">${hrLabel(p.startTime)}</div>
        <div class="h-icon">${cloudIcon(pCloud)}</div>
        <div class="h-temp">${pTemp}</div>
        <div class="h-precip" style="color:${precipColor(pPrecip)}">${pPrecip}%</div>
        <div class="h-rlbl">RAIN</div>
        <div class="h-wind">${pWind}<span class="h-unit"> mph</span></div>
        <div class="h-dir">${pDir}</div>
      </div>`;
    }).join("");

    app.innerHTML=`
      <div class="header">
        <div>
          <div class="loc-name"><span class="loc-dot"></span>DUNEWOOD</div>
          <div class="loc-sub">FIRE ISLAND · NEW YORK</div>
        </div>
        <div class="updated">Updated ${nowStr()}<button class="refresh-btn" onclick="fetchAll()">↻ REFRESH</button></div>
      </div>

      <div class="sec-lbl">TODAY</div>
      <div class="grid">
        <div class="card card-sun">
          <div class="card-icon">🌅</div>
          <div class="card-lbl">SUNRISE</div>
          <div class="card-main">${riseStr}</div>
          <div class="card-sub">Dunewood</div>
        </div>
        <div class="card card-tide">
          <div class="card-icon">🌊</div>
          <div class="card-lbl">NEXT HIGH TIDE</div>
          <div class="card-main">${tideTime}</div>
          <div class="card-sub">${tideFt} ft · Fire Island C.G. Station</div>
        </div>
        <div class="card card-sun">
          <div class="card-icon">🌇</div>
          <div class="card-lbl">SUNSET</div>
          <div class="card-main">${setStr}</div>
          <div class="card-sub">Dunewood</div>
        </div>
      </div>

      <div class="sec-lbl">NOW</div>
      <div class="grid">
        <div class="card">
          <div class="card-icon">🌡️</div>
          <div class="card-lbl">AIR TEMP</div>
          <div class="card-main">${tempF}</div>
          <div class="card-sub">near Dunewood</div>
          <div class="source-tag">${sourceLabel}</div>
        </div>
        <div class="card">
          <div class="card-icon">💨</div>
          <div class="card-lbl">WIND</div>
          <div class="card-main">${windMph} mph</div>
          <div class="card-sub">${windDir}${gustMph?` · gusts ${gustMph}`:""}</div>
          <div class="source-tag">${sourceLabel}</div>
        </div>
        <div class="card">
          <div class="card-icon">🌊</div>
          <div class="card-lbl">WAVES</div>
          <div class="card-main">${waveHtFt} ft</div>
          <div class="card-sub">${wavePer} · ${waveDirStr}</div>
          <div class="source-tag">BUOY 44025</div>
        </div>
        <div class="card">
          <div class="card-icon">🌡️</div>
          <div class="card-lbl">OCEAN WATER TEMP</div>
          <div class="card-main">${waterTempF}</div>
          <div class="card-sub">surface</div>
          <div class="source-tag">BUOY 44025</div>
        </div>
        <div class="card">
          <div class="card-icon">🌧️</div>
          <div class="card-lbl">PRECIP</div>
          <div class="card-main">${precipPct}%</div>
          <div class="card-sub">chance</div>
          <div class="source-tag">${sourceLabel}</div>
        </div>
        <div class="card">
          <div class="card-icon">🕶️</div>
          <div class="card-lbl">UV INDEX</div>
          <div class="card-main" style="color:${uvCol}">${uvVal}</div>
          <div class="card-sub">${uvLbl}</div>
          <div class="source-tag">OPEN-METEO</div>
        </div>
      </div>

      <div class="sec-lbl">REST OF DAY &nbsp;<span style="font-size:8px;opacity:0.5;letter-spacing:2px">${sourceLabel}</span></div>
      <div class="scroll">${hourCards}</div>

      <div class="footer">
        Wind · Temp · Precip: ${wx.source==="NWS"?"NWS api.weather.gov — 2.5km grid, Dunewood zone":"Open-Meteo (NWS unavailable)"}<br>
        UV Index: Open-Meteo · Waves &amp; Water Temp: NOAA Buoy 44025 (20nm S of Fire Island Inlet)<br>
        Tides: NOAA CO-OPS Station ${TIDE_STATION} (Fire Island Coast Guard Station) · Sunrise/Sunset: calculated for Dunewood · All sources public domain
      </div>`;

  } catch(e) {
    app.innerHTML=`<div class="status error">Could not load conditions.<br>
      <small style="font-size:11px;opacity:0.6">${e.message}</small><br><br>
      <button onclick="fetchAll()" style="background:none;border:1px solid rgba(248,113,113,0.4);color:#f87171;font-family:inherit;font-size:11px;letter-spacing:2px;padding:8px 16px;border-radius:3px;cursor:pointer;">↻ TRY AGAIN</button>
    </div>`;
  }
}

fetchAll();
setInterval(fetchAll,10*60*1000);
</script>
</body>
</html>
